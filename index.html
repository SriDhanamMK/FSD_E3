<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventPass — Department Ticket Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --card:      #1a1a24;
      --border:    #2a2a38;
      --accent:    #f0c040;
      --accent2:   #e07b30;
      --text:      #f0ede6;
      --muted:     #888;
      --success:   #4ade80;
      --error:     #f87171;
      --radius:    14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ---- HEADER ---- */
    .site-header {
      background: linear-gradient(135deg, #0f0f18 0%, #1a1020 60%, #0f150f 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }
    .header-badge {
      background: var(--accent);
      color: #0a0a0f;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ---- HERO ---- */
    .hero {
      text-align: center;
      padding: 72px 2rem 48px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1a3a 0%, transparent 70%);
    }
    .hero-tag {
      display: inline-block;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ---- LAYOUT ---- */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 80px;
    }

    /* ---- SECTION TITLE ---- */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ---- EVENT CARDS ---- */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      margin-bottom: 60px;
    }

    .event-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .event-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(240, 192, 64, 0.12);
    }
    .event-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent), 0 12px 40px rgba(240, 192, 64, 0.15);
    }
    .event-card-header {
      background: linear-gradient(135deg, #1e1e30, #161620);
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .event-dept {
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent2);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .event-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .event-card-body { padding: 18px 20px; }
    .event-meta { display: grid; gap: 10px; }
    .meta-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.88rem;
      color: #bbb;
    }
    .meta-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .meta-row strong { color: var(--text); display: block; font-weight: 500; }
    .event-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid var(--border);
    }
    .ticket-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }
    .ticket-price span { font-size: 0.75rem; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 400; }
    .avail-badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
    }
    .avail-badge.ok   { background: rgba(74,222,128,0.12); color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
    .avail-badge.low  { background: rgba(251,191,36,0.12);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .avail-badge.none { background: rgba(248,113,113,0.12); color: var(--error); border: 1px solid rgba(248,113,113,0.3); }

    .select-btn {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s, color 0.15s;
    }
    .select-btn:hover, .select-btn.active {
      background: var(--accent);
      color: #0a0a0f;
    }
    .select-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ---- BOOKING SECTION ---- */
    .booking-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }
    @media (max-width: 768px) {
      .booking-section { grid-template-columns: 1fr; }
      .events-grid { grid-template-columns: 1fr; }
    }

    /* ---- SELECTED EVENT SUMMARY ---- */
    .selected-summary {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .summary-header {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      padding: 20px 24px;
    }
    .summary-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: #0a0a0f;
      font-weight: 900;
    }
    .summary-header p { color: rgba(0,0,0,0.65); font-size: 0.82rem; margin-top: 2px; }
    .summary-body { padding: 20px 24px; display: grid; gap: 12px; }
    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.9rem;
    }
    .summary-item .label { color: var(--muted); }
    .summary-item .value { text-align: right; font-weight: 500; max-width: 60%; }
    .summary-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .no-selection {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
    }
    .no-selection .big-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }

    /* ---- FORM ---- */
    .booking-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }
    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .form-input, .form-select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 11px 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      appearance: none;
    }
    .form-input:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240,192,64,0.1);
    }
    .form-input.error-field { border-color: var(--error); }
    .form-select option { background: var(--surface); }
    .field-error {
      font-size: 0.78rem;
      color: var(--error);
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ---- FORM BUTTONS ---- */
    .form-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-submit {
      flex: 1;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-reset {
      padding: 13px 18px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); }

    /* ---- ALERTS ---- */
    .alert {
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.9rem;
      margin-top: 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .alert-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .alert-loading { background: rgba(240,192,64,0.08); border: 1px solid rgba(240,192,64,0.2); color: var(--accent); }

    /* ---- CONFIRMATION MODAL ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-top {
      background: linear-gradient(135deg, #0d1f12, #0a1a10);
      padding: 36px 32px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .checkmark {
      width: 64px;
      height: 64px;
      background: rgba(74,222,128,0.1);
      border: 2px solid var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 16px;
    }
    .modal-top h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--success);
      margin-bottom: 6px;
    }
    .modal-top p { color: var(--muted); font-size: 0.88rem; }
    .modal-body { padding: 24px 32px; }
    .conf-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .conf-row:last-child { border-bottom: none; }
    .conf-row .key { color: var(--muted); }
    .conf-row .val { font-weight: 600; text-align: right; max-width: 60%; }
    .conf-total .key { font-size: 1rem; color: var(--text); font-weight: 600; }
    .conf-total .val { font-size: 1.2rem; color: var(--accent); font-family: 'Playfair Display', serif; }
    .modal-footer { padding: 0 32px 28px; }
    .btn-close-modal {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-close-modal:hover { opacity: 0.9; }

    /* ---- LOADER ---- */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- SKELETONS ---- */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, #1e1e2c 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-card { height: 220px; border-radius: var(--radius); margin-bottom: 0; }

    /* ---- FOOTER ---- */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

// 🔐 Protect page (redirect if not logged in)
if (!localStorage.getItem("userLoggedIn")) {
  window.location.href = "login.html";
}

const { useState, useEffect } = React;

  // ── CONFIG ─────────────────────────────────────────────
  // Change this to your XAMPP folder name
  const API_BASE = 'http://localhost/FullStack.ModelLab';

  // ── DEPARTMENTS ────────────────────────────────────────
  const DEPARTMENTS = [
    'Computer Science & Engineering',
    'Information Technology',
    'Electronics & Communication',
    'Electrical Engineering',
    'Mechanical Engineering',
    'Civil Engineering',
    'Management Studies',
    'Mathematics',
    'Physics',
    'Chemistry',
    'Faculty / Staff',
  ];

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  EventCard Component
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function EventCard({ event, selected, onSelect }) {
    const fmtDate = d => new Date(d).toLocaleDateString('en-IN', { weekday:'short', year:'numeric', month:'long', day:'numeric' });
    const fmtTime = t => {
      const [h,m] = t.split(':');
      const hh = +h;
      return `${hh > 12 ? hh-12 : hh || 12}:${m} ${hh >= 12 ? 'PM' : 'AM'}`;
    };

    const availClass = event.available_tickets === 0 ? 'none'
                     : event.available_tickets <= 20 ? 'low'
                     : 'ok';
    const availLabel = event.available_tickets === 0 ? 'Sold Out'
                     : event.available_tickets <= 20 ? `${event.available_tickets} left!`
                     : `${event.available_tickets} available`;

    return (
      <div className={`event-card ${selected ? 'selected' : ''}`}>
        <div className="event-card-header">
          <div className="event-dept">{event.department}</div>
          <div className="event-name">{event.event_name}</div>
        </div>
        <div className="event-card-body">
          <div className="event-meta">
            <div className="meta-row"><span className="meta-icon">📅</span><div><strong>{fmtDate(event.event_date)}</strong>{fmtTime(event.event_time)}</div></div>
            <div className="meta-row"><span className="meta-icon">📍</span><div><strong>{event.venue}</strong></div></div>
            {event.description && <div className="meta-row"><span className="meta-icon">ℹ️</span><div style={{color:'#999',fontSize:'0.82rem'}}>{event.description.substring(0,100)}…</div></div>}
          </div>
          <button
            className={`select-btn ${selected ? 'active' : ''}`}
            onClick={() => onSelect(event)}
            disabled={event.available_tickets === 0}
          >
            {event.available_tickets === 0 ? 'Sold Out' : selected ? '✓ Selected' : 'Book This Event'}
          </button>
        </div>
        <div className="event-card-footer">
          <div className="ticket-price">
            ₹{event.ticket_price.toLocaleString('en-IN')} <span>/ ticket</span>
          </div>
          <span className={`avail-badge ${availClass}`}>{availLabel}</span>
        </div>
      </div>
    );
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  SelectedEventSummary Component
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function SelectedEventSummary({ event, numTickets }) {
    if (!event) return (
      <div className="no-selection">
        <div className="big-icon">🎟️</div>
        <div style={{fontWeight:600,marginBottom:6}}>No Event Selected</div>
        <div style={{fontSize:'0.85rem'}}>Pick an event above to begin booking</div>
      </div>
    );

    const fmtDate = d => new Date(d).toLocaleDateString('en-IN', { weekday:'short', year:'numeric', month:'long', day:'numeric' });
    const fmtTime = t => {
      const [h,m] = t.split(':');
      const hh = +h;
      return `${hh > 12 ? hh-12 : hh || 12}:${m} ${hh >= 12 ? 'PM' : 'AM'}`;
    };
    const total = (numTickets > 0 ? numTickets : 0) * event.ticket_price;

    return (
      <div className="selected-summary">
        <div className="summary-header">
          <h3>{event.event_name}</h3>
          <p>{event.department}</p>
        </div>
        <div className="summary-body">
          <div className="summary-item"><span className="label">📅 Date</span><span className="value">{fmtDate(event.event_date)}</span></div>
          <div className="summary-item"><span className="label">🕐 Time</span><span className="value">{fmtTime(event.event_time)}</span></div>
          <div className="summary-item"><span className="label">📍 Venue</span><span className="value">{event.venue}</span></div>
          <div className="summary-divider"/>
          <div className="summary-item"><span className="label">Price / ticket</span><span className="value" style={{color:'var(--accent)'}}>₹{event.ticket_price.toLocaleString('en-IN')}</span></div>
          <div className="summary-item"><span className="label">Tickets requested</span><span className="value">{numTickets > 0 ? numTickets : '—'}</span></div>
          <div className="summary-divider"/>
          <div className="summary-item" style={{fontWeight:700}}>
            <span>Total Amount</span>
            <span style={{color:'var(--accent)',fontFamily:'Playfair Display,serif',fontSize:'1.2rem'}}>
              {numTickets > 0 ? `₹${total.toLocaleString('en-IN')}` : '—'}
            </span>
          </div>
        </div>
      </div>
    );
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  BookingForm Component
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function BookingForm({ event, onSuccess }) {
    const emptyForm = { name:'', email:'', department:'', numTickets:'' };
    const [form, setForm] = useState(emptyForm);
    const [errors, setErrors] = useState({});
    const [apiError, setApiError] = useState('');
    const [loading, setLoading] = useState(false);

    const validate = () => {
      const e = {};
      if (!form.name.trim()) e.name = 'Full name is required.';
      if (!form.email.trim()) e.email = 'Email ID is required.';
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Please enter a valid email address.';
      if (!form.department) e.department = 'Department is required.';
      if (!form.numTickets) e.numTickets = 'Number of tickets is required.';
      else if (isNaN(form.numTickets) || +form.numTickets <= 0) e.numTickets = 'Must be a positive number.';
      else if (!Number.isInteger(+form.numTickets)) e.numTickets = 'Must be a whole number.';
      else if (event && +form.numTickets > event.available_tickets) e.numTickets = `Only ${event.available_tickets} ticket(s) available.`;
      return e;
    };

    const handleChange = (field, value) => {
      setForm(f => ({ ...f, [field]: value }));
      setErrors(e => ({ ...e, [field]: '' }));
      setApiError('');
    };

    const handleSubmit = async () => {
      if (!event) { setApiError('Please select an event first.'); return; }
      const e = validate();
      if (Object.keys(e).length > 0) { setErrors(e); return; }

      setLoading(true);
      setApiError('');
      try {
        const res = await fetch(`${API_BASE}/book_ticket.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_id:    event.id,
            user_name:   form.name.trim(),
            email:       form.email.trim(),
            department:  form.department,
            num_tickets: +form.numTickets,
          }),
        });
        const data = await res.json();
        if (data.success) {
          onSuccess(data);
        } else {
          setApiError(data.message || 'Booking failed. Please try again.');
        }
      } catch {
        setApiError('Could not connect to the server. Make sure XAMPP is running.');
      } finally {
        setLoading(false);
      }
    };

    const handleReset = () => {
      setForm(emptyForm);
      setErrors({});
      setApiError('');
    };

    const field = (id, label, placeholder, type='text') => (
      <div className="form-group">
        <label className="form-label">{label}</label>
        <input
          className={`form-input ${errors[id] ? 'error-field' : ''}`}
          type={type}
          placeholder={placeholder}
          value={form[id]}
          onChange={ev => handleChange(id, ev.target.value)}
          disabled={loading}
        />
        {errors[id] && <div className="field-error">⚠ {errors[id]}</div>}
      </div>
    );

    return (
      <div className="booking-form">
        <div className="form-title">🎟 Book Your Tickets</div>

        {!event && (
          <div className="alert alert-loading" style={{marginBottom:18}}>
            ← Please select an event from the list above first.
          </div>
        )}

        {field('name', 'Full Name', 'e.g. Priya Ramachandran')}
        {field('email', 'Email ID', 'e.g. priya@college.edu', 'email')}

        <div className="form-group">
          <label className="form-label">Department</label>
          <select
            className={`form-select ${errors.department ? 'error-field' : ''}`}
            value={form.department}
            onChange={ev => handleChange('department', ev.target.value)}
            disabled={loading}
          >
            <option value="">— Select Department —</option>
            {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
          {errors.department && <div className="field-error">⚠ {errors.department}</div>}
        </div>

        <div className="form-group">
          <label className="form-label">Number of Tickets</label>
          <input
            className={`form-input ${errors.numTickets ? 'error-field' : ''}`}
            type="number"
            min="1"
            max={event ? event.available_tickets : 100}
            placeholder="e.g. 2"
            value={form.numTickets}
            onChange={ev => handleChange('numTickets', ev.target.value)}
            disabled={loading}
          />
          {errors.numTickets && <div className="field-error">⚠ {errors.numTickets}</div>}
          {event && form.numTickets > 0 && !errors.numTickets && (
            <div style={{fontSize:'0.8rem',color:'var(--muted)',marginTop:5}}>
              Total: ₹{(+form.numTickets * event.ticket_price).toLocaleString('en-IN')}
            </div>
          )}
        </div>

        {apiError && <div className="alert alert-error">⛔ {apiError}</div>}

        <div className="form-actions">
          <button className="btn-submit" onClick={handleSubmit} disabled={loading}>
            {loading ? <><span className="spinner"/>Processing…</> : '✓ Confirm Booking'}
          </button>
          <button className="btn-reset" onClick={handleReset} disabled={loading}>Reset</button>
        </div>
      </div>
    );
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ConfirmationModal Component
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function ConfirmationModal({ booking, onClose }) {
    return (
      <div className="modal-overlay">
        <div className="modal">
          <div className="modal-top">
            <div className="checkmark">✓</div>
            <h2>Booking Confirmed!</h2>
            <p>Your ticket has been successfully registered.</p>
          </div>
          <div className="modal-body">
            <div className="conf-row"><span className="key">Booking ID</span><span className="val" style={{color:'var(--accent)'}}>#{String(booking.booking_id).padStart(5,'0')}</span></div>
            <div className="conf-row"><span className="key">Name</span><span className="val">{booking.user_name}</span></div>
            <div className="conf-row"><span className="key">Event</span><span className="val">{booking.event_name}</span></div>
            <div className="conf-row"><span className="key">Tickets Booked</span><span className="val">{booking.num_tickets}</span></div>
            <div className="conf-row conf-total"><span className="key">Total Amount</span><span className="val">₹{booking.total_amount.toLocaleString('en-IN')}</span></div>
          </div>
          <div className="modal-footer">
            <button className="btn-close-modal" onClick={onClose}>Done — Back to Events</button>
          </div>
        </div>
      </div>
    );
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  App (Root Component)
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function App() {
    const [events, setEvents]           = useState([]);
    const [loading, setLoading]         = useState(true);
    const [fetchError, setFetchError]   = useState('');
    const [selectedEvent, setSelectedEvent] = useState(null);
    const [numTickets, setNumTickets]   = useState(0);
    const [confirmation, setConfirmation] = useState(null);

    // Fetch events on mount
    useEffect(() => {
      fetch(`${API_BASE}/get_events.php`)
        .then(r => r.json())
        .then(data => {
          if (data.success) setEvents(data.events);
          else setFetchError(data.message || 'Could not load events.');
        })
        .catch(() => setFetchError('Cannot reach server. Ensure XAMPP is running and visit http://localhost/ticket-booking/get_events.php to verify.'))
        .finally(() => setLoading(false));
    }, []);

    const handleSelectEvent = (event) => {
      setSelectedEvent(prev => prev?.id === event.id ? null : event);
      setNumTickets(0);
    };

    const handleBookingSuccess = (data) => {
      // Update local ticket count
      setEvents(evs => evs.map(e =>
        e.id === selectedEvent.id
          ? { ...e, available_tickets: data.available_tickets }
          : e
      ));
      setConfirmation(data);
    };

    const handleModalClose = () => {
      setConfirmation(null);
      setSelectedEvent(null);
      setNumTickets(0);
    };

    return (
      <>
        {/* Header */}
        <header className="site-header">
  <div className="logo">Event<span>Pass</span></div>

  <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
    <div className="header-badge">Internal Events</div>

    <button
      style={{
        padding: '6px 12px',
        background: 'transparent',
        border: '1px solid #f87171',
        color: '#f87171',
        borderRadius: '6px',
        cursor: 'pointer'
      }}
      onClick={() => {
        localStorage.removeItem("userLoggedIn");
        window.location.href = "login.html";
      }}
    >
      Logout
    </button>
  </div>
</header>

        {/* Hero */}
        <div className="hero">
          <div className="hero-tag">🎓 Department Event Portal</div>
          <h1>Book Your <em>Tickets</em><br/>For Campus Events</h1>
          <p>Explore upcoming technical fests, seminars, and workshops. Reserve your spot in seconds.</p>
        </div>

        {/* Main */}
        <main className="main-content">

          {/* Events Section */}
          <div className="section-title">📌 Upcoming Events</div>

          {loading && (
            <div className="events-grid">
              {[1,2,3].map(i => <div key={i} className="skeleton skel-card"/>)}
            </div>
          )}

          {fetchError && (
            <div className="alert alert-error" style={{marginBottom:32}}>
              ⛔ {fetchError}
            </div>
          )}

          {!loading && !fetchError && (
            <div className="events-grid">
              {events.map(ev => (
                <EventCard
                  key={ev.id}
                  event={ev}
                  selected={selectedEvent?.id === ev.id}
                  onSelect={handleSelectEvent}
                />
              ))}
            </div>
          )}

          {/* Booking Section */}
          <div className="section-title">✍️ Booking Details</div>
          <div className="booking-section">
            <div>
              <div style={{marginBottom:16,fontSize:'0.85rem',color:'var(--muted)'}}>
                {selectedEvent ? `Booking for: ${selectedEvent.event_name}` : 'Select an event above to view details here'}
              </div>
              <SelectedEventSummary event={selectedEvent} numTickets={numTickets} />
            </div>
            <BookingForm
              event={selectedEvent}
              onSuccess={handleBookingSuccess}
            />
          </div>
        </main>
        {/* 🔐 Admin Panel Button */}
<div style={{textAlign:'center', marginTop:'40px'}}>
  <button
    onClick={() => window.location.href = "http://localhost/FullStack.ModelLab/admin.html"}
    style={{
      padding: '10px 18px',
      border: '1px solid gold',
      background: 'transparent',
      color: 'gold',
      borderRadius: '8px',
      cursor: 'pointer'
    }}
  >
    🔐 Admin Panel
  </button>
</div>

        <footer>
          © 2025 EventPass — Department Event Booking System &nbsp;|&nbsp; Powered by React JS + PHP + MySQL
        </footer>

        {/* Confirmation Modal */}
        {confirmation && (
          <ConfirmationModal booking={confirmation} onClose={handleModalClose} />
        )}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
