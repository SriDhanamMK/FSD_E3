<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EventPass</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --card:      #1a1a24;
      --border:    #2a2a38;
      --accent:    #f0c040;
      --accent2:   #e07b30;
      --text:      #f0ede6;
      --muted:     #888;
      --success:   #4ade80;
      --error:     #f87171;
      --radius:    14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1a3a 0%, transparent 70%);
    }
    .login-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      margin: 0 0 8px;
      letter-spacing: -0.5px;
    }
    .login-header h2 span { color: var(--text); }
    .login-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      color: var(--muted);
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    
    /* Forms */
    .form-container {
      display: none;
    }
    .form-container.active {
      display: block;
      animation: fadeInForm 0.3s ease;
    }
    @keyframes fadeInForm {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240, 192, 64, 0.15);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }
    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .msg {
      margin-top: 16px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
    .msg-error {
      color: var(--error);
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      display: block;
    }
    .msg-success {
      color: var(--success);
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      display: block;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <h2>Event<span>Pass</span></h2>
    <p>Sign in to your account</p>
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('student')">Student Login</div>
    <div class="tab" onclick="switchTab('admin')">Admin Login</div>
  </div>

  <!-- Student Form -->
  <div id="student-form" class="form-container active">
    <div class="form-group">
      <label>VTU Number</label>
      <input type="text" id="vtu" placeholder="Enter your VTU Number">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="student-pass" placeholder="Enter your password">
    </div>
    <button class="login-btn" onclick="loginStudent()">Login as Student</button>
    <div id="student-msg" class="msg"></div>
  </div>

  <!-- Admin Form -->
  <div id="admin-form" class="form-container">
    <div class="form-group">
      <label>Admin Username</label>
      <input type="text" id="admin-user" placeholder="Enter admin username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="admin-pass" placeholder="Enter your password">
    </div>
    <button class="login-btn" onclick="loginAdmin()">Login as Admin</button>
    <div id="admin-msg" class="msg"></div>
  </div>

</div>

<script>
function switchTab(tab) {
  // Update Tabs
  const tabs = document.querySelectorAll('.tab');
  tabs[0].className = tab === 'student' ? 'tab active' : 'tab';
  tabs[1].className = tab === 'admin' ? 'tab active' : 'tab';
  
  // Update Forms
  document.getElementById('student-form').className = tab === 'student' ? 'form-container active' : 'form-container';
  document.getElementById('admin-form').className = tab === 'admin' ? 'form-container active' : 'form-container';
  
  // Clear Messages
  document.getElementById('student-msg').className = 'msg';
  document.getElementById('admin-msg').className = 'msg';
}

function showMessage(id, text, isError) {
  const el = document.getElementById(id);
  el.className = isError ? 'msg msg-error' : 'msg msg-success';
  el.innerText = text;
}

function loginStudent() {
  const vtu = document.getElementById("vtu").value.trim();
  const pass = document.getElementById("student-pass").value.trim();

  if (!vtu || !pass) {
    showMessage("student-msg", "⚠ Please fill all fields!", true);
    return;
  }

  if (vtu === pass) {
    showMessage("student-msg", "✓ Success! Redirecting...", false);
    localStorage.setItem("userLoggedIn", "true");
    localStorage.setItem("vtu", vtu);
    setTimeout(() => {
      window.location.href = "home.html";
    }, 800);
  } else {
    showMessage("student-msg", "⚠ Invalid VTU Number or Password!", true);
  }
}

function loginAdmin() {
  const u = document.getElementById("admin-user").value.trim();
  const p = document.getElementById("admin-pass").value.trim();

  if (!u || !p) {
    showMessage("admin-msg", "⚠ Please fill all fields!", true);
    return;
  }

  if (u === "ADMIN" && p === "QWERTYUIOP") {
    showMessage("admin-msg", "✓ Success! Redirecting...", false);
    localStorage.setItem("isAdmin", "true");
    setTimeout(() => {
      window.location.href = "admin_dashboard.html";
    }, 800);
  } else {
    showMessage("admin-msg", "⚠ Invalid Admin Credentials!", true);
  }
}

document.addEventListener('keypress', function (e) {
  if (e.key === 'Enter') {
    if (document.getElementById('student-form').classList.contains('active')) {
      loginStudent();
    } else {
      loginAdmin();
    }
  }
});
</script>

</body>
</html>
