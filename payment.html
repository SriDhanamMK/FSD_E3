<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Gateway - EventPass</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --card:      #1a1a24;
      --border:    #2a2a38;
      --accent:    #f0c040;
      --accent2:   #e07b30;
      --text:      #f0ede6;
      --muted:     #888;
      --success:   #4ade80;
      --error:     #f87171;
      --radius:    14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1a3a 0%, transparent 70%);
    }
    .payment-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.4s ease-out forwards;
      overflow: hidden;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .payment-header {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 30px;
      text-align: center;
      color: #0a0a0f;
    }
    .payment-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 5px;
    }
    .payment-header p {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .payment-body {
      padding: 30px;
    }
    .order-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 24px;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .order-row:last-child { margin-bottom: 0; }
    .order-row .label { color: var(--muted); }
    .order-row.total {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }
    
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 12px 14px;
      transition: all 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240, 192, 64, 0.15);
    }
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .btn-pay {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-pay:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-pay:active { transform: translateY(0); }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .cancel-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .cancel-link:hover { color: var(--text); }

    .loader {
      width: 20px; height: 20px;
      border: 3px solid rgba(0,0,0,0.2);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #error-msg {
      color: var(--error);
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

<div class="payment-container">
  <div class="payment-header">
    <h2>Secure Checkout</h2>
    <p>Dummy Payment Gateway</p>
  </div>
  <div class="payment-body">
    
    <div class="order-summary" id="order-summary">
      <div class="order-row"><span class="label">Event</span><span id="summ-event">—</span></div>
      <div class="order-row"><span class="label">Tickets</span><span id="summ-tickets">—</span></div>
      <div class="order-row total"><span class="label">Total Amount</span><span id="summ-total">₹0</span></div>
    </div>

    <div class="form-group">
      <label class="form-label">Cardholder Name (Dummy)</label>
      <input type="text" class="form-input" placeholder="e.g. John Doe" value="Dummy User" id="card-name">
    </div>
    
    <div class="form-group">
      <label class="form-label">Card Number (Dummy)</label>
      <input type="text" class="form-input" placeholder="0000 0000 0000 0000" value="4111 1111 1111 1111" id="card-num" maxlength="19">
    </div>
    
    <div class="row-2">
      <div class="form-group">
        <label class="form-label">Expiry (MM/YY)</label>
        <input type="text" class="form-input" placeholder="12/26" value="12/28" id="card-exp" maxlength="5">
      </div>
      <div class="form-group">
        <label class="form-label">CVV</label>
        <input type="password" class="form-input" placeholder="123" value="123" id="card-cvv" maxlength="4">
      </div>
    </div>

    <div id="error-msg"></div>

    <button class="btn-pay" id="btn-pay" onclick="processPayment()">
      <span class="loader" id="loader"></span>
      <span id="btn-text">Pay Now</span>
    </button>
    
    <a href="home.html" class="cancel-link">Cancel and return</a>

  </div>
</div>

<script>
  // Read pending booking
  const pendingData = sessionStorage.getItem('pendingBooking');
  if (!pendingData) {
    window.location.href = 'home.html';
  }
  
  let bookingData;
  try {
    bookingData = JSON.parse(pendingData);
    document.getElementById('summ-event').innerText = bookingData.event_name;
    document.getElementById('summ-tickets').innerText = bookingData.num_tickets;
    document.getElementById('summ-total').innerText = '₹' + bookingData.total_amount.toLocaleString('en-IN');
    document.getElementById('btn-text').innerText = 'Pay ₹' + bookingData.total_amount.toLocaleString('en-IN');
  } catch(e) {
    window.location.href = 'home.html';
  }

  // Format Card Number nicely
  document.getElementById('card-num').addEventListener('input', function (e) {
    let target = e.target;
    let position = target.selectionEnd;
    let length = target.value.length;
    target.value = target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
    target.selectionEnd = position += ((target.value.charAt(position - 1) === ' ' && target.value.charAt(length - 1) === ' ' && length !== target.value.length) ? 1 : 0);
  });

  async function processPayment() {
    // Basic frontend validation for dummy UI
    const num = document.getElementById('card-num').value.replace(/\s/g, '');
    const exp = document.getElementById('card-exp').value;
    const cvv = document.getElementById('card-cvv').value;
    const errObj = document.getElementById('error-msg');
    
    if (num.length < 15 || exp.length < 5 || cvv.length < 3) {
      errObj.innerText = "Please enter valid dummy card details.";
      errObj.style.display = 'block';
      return;
    }
    errObj.style.display = 'none';

    // Show loading
    const btn = document.getElementById('btn-pay');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btn-text');
    btn.disabled = true;
    loader.style.display = 'inline-block';
    btnText.innerText = 'Processing...';

    // Simulate Network Delay for Payment Gateway
    setTimeout(async () => {
      // Payment "Successful", now call the actual API
      try {
        const vtu = localStorage.getItem('vtu') || '';
        const payload = {
          event_id: bookingData.event_id,
          vtu: vtu,
          user_name: bookingData.user_name,
          email: bookingData.email,
          department: bookingData.department,
          num_tickets: bookingData.num_tickets
        };

        const res = await fetch('http://localhost/FullStack.ModelLab/book_ticket.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        
        if (data.success) {
          loader.style.display = 'none';
          btnText.innerHTML = 'Payment Confirmed! ✓';
          btn.style.background = 'var(--success)';
          btn.style.color = '#fff';
          
          sessionStorage.setItem('bookingSuccess', JSON.stringify(data));
          sessionStorage.removeItem('pendingBooking');
          
          setTimeout(() => {
            window.location.href = 'home.html';
          }, 1500);
        } else {
          throw new Error(data.message || 'Booking API failed');
        }
      } catch (error) {
        errObj.innerText = 'Error: ' + error.message;
        errObj.style.display = 'block';
        btn.disabled = false;
        loader.style.display = 'none';
        btnText.innerText = 'Pay ₹' + bookingData.total_amount.toLocaleString('en-IN');
      }
    }, 1500);
  }
</script>
</body>
</html>
